<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JeoparTy AI Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #060B27;
    --blue: #0A1A6B;
    --gold: #D4A017;
    --gold-light: #F5C842;
    --gold-dim: #7A5C0A;
    --white: #F0EDE4;
    --muted: #8A8680;
    --border: rgba(212,160,23,0.25);
    --success: #2ECC71;
    --error: #E74C3C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(212,160,23,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,160,23,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 56px;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 8px;
  }

  .logo-bar {
    width: 40px;
    height: 3px;
    background: var(--gold);
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 4px;
    color: var(--gold-light);
    line-height: 1;
    text-shadow: 0 0 40px rgba(245,200,66,0.3);
  }

  .logo-text span {
    color: var(--white);
  }

  .tagline {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 10px;
  }

  /* Card */
  .card {
    background: rgba(10, 26, 107, 0.35);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 36px 40px;
    margin-bottom: 16px;
    backdrop-filter: blur(8px);
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Form fields */
  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="password"],
  textarea {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px 16px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus,
  input[type="password"]:focus,
  textarea:focus {
    border-color: var(--gold);
  }

  input::placeholder, textarea::placeholder {
    color: rgba(240,237,228,0.2);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .field-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .field-hint a {
    color: var(--gold);
    text-decoration: none;
  }

  /* Toggle for API key visibility */
  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-row input { flex: 1; }

  .toggle-btn {
    background: rgba(212,160,23,0.1);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 0 14px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 1px;
    white-space: nowrap;
    transition: background 0.2s;
  }

  .toggle-btn:hover { background: rgba(212,160,23,0.2); }

  /* Generate button */
  .btn-generate {
    width: 100%;
    padding: 18px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 2px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-generate:hover:not(:disabled) {
    background: var(--gold-light);
  }

  .btn-generate:active:not(:disabled) {
    transform: scale(0.99);
  }

  .btn-generate:disabled {
    background: var(--gold-dim);
    cursor: not-allowed;
    color: rgba(6,11,39,0.6);
  }

  /* Status area */
  .status {
    margin-top: 20px;
    min-height: 24px;
  }

  .status-message {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 2px;
    border: 1px solid transparent;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .status-message.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .status-message.loading {
    border-color: var(--border);
    background: rgba(10,26,107,0.3);
    color: var(--gold-light);
  }

  .status-message.success {
    border-color: rgba(46,204,113,0.3);
    background: rgba(46,204,113,0.08);
    color: var(--success);
  }

  .status-message.error {
    border-color: rgba(231,76,60,0.3);
    background: rgba(231,76,60,0.08);
    color: var(--error);
  }

  /* Spinner */
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(245,200,66,0.3);
    border-top-color: var(--gold-light);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Progress steps */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
  }

  .step {
    font-size: 12px;
    color: var(--muted);
    padding-left: 18px;
    position: relative;
    transition: color 0.3s;
  }

  .step::before {
    content: '○';
    position: absolute;
    left: 0;
    color: var(--muted);
  }

  .step.active {
    color: var(--gold-light);
  }

  .step.active::before {
    content: '●';
    color: var(--gold-light);
  }

  .step.done {
    color: var(--success);
  }

  .step.done::before {
    content: '✓';
    color: var(--success);
  }

  /* Preview panel */
  .preview {
    display: none;
    margin-top: 16px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px;
  }

  .preview.visible { display: block; }

  .preview-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 12px;
  }

  .cat-pill {
    background: rgba(212,160,23,0.15);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 6px 8px;
    font-size: 10px;
    text-align: center;
    color: var(--gold-light);
    line-height: 1.3;
  }

  .fj-preview {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  .fj-preview strong {
    color: var(--white);
    font-weight: 400;
  }

  /* Download button */
  .btn-download {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 2px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }

  .btn-download:hover {
    background: var(--gold);
    color: var(--navy);
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 48px;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="logo-line">
      <div class="logo-bar"></div>
      <div class="logo-text">Jeopar<span>Ty</span></div>
      <div class="logo-bar"></div>
    </div>
    <div class="tagline">AI Game Generator · Powered by Gemini</div>
  </header>

  <div class="card">
    <div class="card-title">Configuration</div>

    <div class="field">
      <label>Gemini API Key</label>
      <div class="input-row">
        <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
        <button class="toggle-btn" onclick="toggleKey()">SHOW</button>
      </div>
      <div class="field-hint">
        Your key never leaves your browser. Get one free at
        <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a>
      </div>
    </div>

    <div class="field">
      <label>Theme</label>
      <input type="text" id="theme" placeholder="e.g. Marine Biology in Huatulco" />
      <div class="field-hint">Be specific — the more detail, the better your game.</div>
    </div>

    <div class="field">
      <label>Vocabulary List <span style="opacity:0.5">(optional)</span></label>
      <textarea id="vocab" placeholder="comma-separated words or phrases to include..."></textarea>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generate()">
      Generate Game
    </button>

    <div class="status" id="status"></div>
  </div>

  <div class="preview" id="preview">
    <div class="preview-title">Game Preview</div>
    <div class="categories-grid" id="categoriesGrid"></div>
    <div class="fj-preview" id="fjPreview"></div>
    <a class="btn-download" id="downloadBtn" href="#" download="JeoparTy_Game.pptm">
      ⬇ Download .pptm Game File
    </a>
  </div>

  <footer class="footer">
    API key is used client-side only &nbsp;·&nbsp; Game file generated server-side
  </footer>

</div>

<script>
  const BACKEND_URL = window.location.hostname === 'localhost'
    ? 'http://localhost:8000'
    : '';  // same-origin on Render

  let keyVisible = false;

  function toggleKey() {
    keyVisible = !keyVisible;
    const input = document.getElementById('apiKey');
    const btn = document.querySelector('.toggle-btn');
    input.type = keyVisible ? 'text' : 'password';
    btn.textContent = keyVisible ? 'HIDE' : 'SHOW';
  }

  function setStatus(type, message, steps = null) {
    const el = document.getElementById('status');
    let stepsHtml = '';
    if (steps) {
      stepsHtml = '<div class="steps">' +
        steps.map(s => `<div class="step ${s.state}">${s.label}</div>`).join('') +
        '</div>';
    }
    const icon = type === 'loading'
      ? '<div class="spinner"></div>'
      : type === 'success' ? '✓' : '✕';
    el.innerHTML = `
      <div class="status-message ${type}">
        ${icon}
        <div>
          <div>${message}</div>
          ${stepsHtml}
        </div>
      </div>`;
    requestAnimationFrame(() => {
      el.querySelector('.status-message').classList.add('visible');
    });
  }

  function clearStatus() {
    document.getElementById('status').innerHTML = '';
  }

  async function generate() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const theme = document.getElementById('theme').value.trim();
    const vocab = document.getElementById('vocab').value.trim();

    if (!apiKey) return setStatus('error', 'Please enter your Gemini API key.');
    if (!theme) return setStatus('error', 'Please enter a theme.');

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    document.getElementById('preview').classList.remove('visible');

    // Step 1: call Gemini
    setStatus('loading', 'Generating game content…', [
      { state: 'active', label: 'Calling Gemini API' },
      { state: '', label: 'Building game file' },
      { state: '', label: 'Ready to download' },
    ]);

    let gameData;
    try {
      gameData = await callGemini(apiKey, theme, vocab);
    } catch (err) {
      btn.disabled = false;
      return setStatus('error', 'Gemini error: ' + err.message);
    }

    // Step 2: send to backend
    setStatus('loading', 'Building your .pptm file…', [
      { state: 'done', label: 'Calling Gemini API' },
      { state: 'active', label: 'Building game file' },
      { state: '', label: 'Ready to download' },
    ]);

    let blob;
    try {
      const res = await fetch(BACKEND_URL + '/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game_data: gameData }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }
      blob = await res.blob();
    } catch (err) {
      btn.disabled = false;
      return setStatus('error', 'Backend error: ' + err.message);
    }

    // Step 3: show download
    setStatus('success', 'Your game is ready!', [
      { state: 'done', label: 'Calling Gemini API' },
      { state: 'done', label: 'Building game file' },
      { state: 'done', label: 'Ready to download' },
    ]);

    const url = URL.createObjectURL(blob);
    const dlBtn = document.getElementById('downloadBtn');
    dlBtn.href = url;

    // Populate preview
    const grid = document.getElementById('categoriesGrid');
    grid.innerHTML = gameData.categories
      .map(c => `<div class="cat-pill">${c}</div>`)
      .join('');

    document.getElementById('fjPreview').innerHTML =
      `<strong>Final JeoparTy:</strong> ${gameData.finalJeopardyTopic} — ${gameData.finalJeopardyAnswer}`;

    document.getElementById('preview').classList.add('visible');

    btn.disabled = false;
  }

  async function callGemini(apiKey, theme, vocab) {
    const vocabClause = vocab
      ? `Vocabulary to incorporate: ${vocab}.`
      : 'No specific vocabulary required.';

    const prompt = buildPrompt(theme, vocabClause);

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
        })
      }
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Empty response from Gemini');

    // Strip markdown fences if present
    const clean = text.replace(/^```json\s*/i, '').replace(/```\s*$/i, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch (e) {
      throw new Error('Gemini returned invalid JSON. Try again.');
    }

    // Validate structure
    if (!parsed.categories || !parsed.clues || !parsed.answers) {
      throw new Error('Unexpected JSON structure from Gemini.');
    }

    return parsed;
  }

  function buildPrompt(theme, vocabClause) {
    return `You are generating content for a Jeopardy game. Theme: ${theme}. ${vocabClause}
STEP 1: Quietly select 25 unique, high-quality answers (words, names, or concepts) related to the theme.
STEP 2: Organize into exactly 5 categories with 5 answers each at difficulty levels 200, 400, 600, 800, 1000.
STEP 3: For each answer, imagine it written on a card. Write a clue that defines, describes, or gives a famous quote about that card WITHOUT using any word from it.
STEP 4: Review every clue. Ask: if a player only heard this clue, would they arrive at exactly ONE answer? If not, rewrite it to be more specific. GOOD EXAMPLE - Answer: photosynthesis  GOOD Clue: The process by which plants use sunlight and carbon dioxide to produce food and oxygen. BAD Clue: This process is how plants make energy. (too vague)  BAD Clue: Photosynthesis is what plants do to survive. (answer word is IN the clue)
CLUE RULES:
1. FORBIDDEN: The answer word must NEVER appear in the clue, including parts of the word.
2. SPECIFICITY: Never write vague clues. Always include a specific fact, detail, or context.
3. PERSONS: If the answer is a person, the clue can reference their famous quotes, achievements, or historical significance without naming them directly.
4. PHRASES: If the answer is a phrase or saying, provide context, origin, or a partial quote that makes the specific answer the only logical conclusion. Never write the full answer phrase directly in the clue.
5. DIFFICULTY: 200 = simple definition, 400 = general knowledge, 600 = specific facts, 800 = obscure details, 1000 = expert level.
6. UNIQUENESS: Every answer must be different - never repeat an answer anywhere in the game.
7. PROGRESSION: Make clues progressively harder within each category.
8. ACCURACY: Every fact in every clue must be 100% verifiable and correct. If you are not certain a fact is accurate, use a different clue.
FORMATTING RULES:
- Do NOT use quotation marks inside clues or answers - they break the JSON parser.
- Use only standard straight apostrophes ('), never curly ones.
- Do NOT use What is or Who is in answers. Direct responses only.
- Answers must be short: one word or a brief phrase, never a full sentence.
Also create 1 Final Jeopardy clue, answer, and a short topic name (2-4 words) for the Final Jeopardy category.
Respond ONLY with valid JSON in this exact structure, no markdown backticks, no explanation:
{"categories":["Cat1","Cat2","Cat3","Cat4","Cat5"],"clues":[["Q200C1","Q200C2","Q200C3","Q200C4","Q200C5"],["Q400C1","Q400C2","Q400C3","Q400C4","Q400C5"],["Q600C1","Q600C2","Q600C3","Q600C4","Q600C5"],["Q800C1","Q800C2","Q800C3","Q800C4","Q800C5"],["Q1000C1","Q1000C2","Q1000C3","Q1000C4","Q1000C5"]],"answers":[["A200C1","A200C2","A200C3","A200C4","A200C5"],["A400C1","A400C2","A400C3","A400C4","A400C5"],["A600C1","A600C2","A600C3","A600C4","A600C5"],["A800C1","A800C2","A800C3","A800C4","A800C5"],["A1000C1","A1000C2","A1000C3","A1000C4","A1000C5"]],"finalJeopardyClue":"FJ clue here","finalJeopardyAnswer":"FJ answer here","finalJeopardyTopic":"FJ topic here"}`;
  }
</script>
</body>
</html>
