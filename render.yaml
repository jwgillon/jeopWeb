services:
  - type: web
    name: jeoparty-generator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: template
      mountPath: /opt/render/project/src
      sizeGB: 1
